template_id: T04_Progressive_Refinement_Shot_Type
description: "The user specified the shooting viewpoint or shot type during the refinement process."
dialogue_pattern:
  description: "Broad Category -> Add Attributes -> Specify Perspective -> Further Refinement (if needed) -> Lock on Target"
  important_notes:
  - "These stages are LOGICAL PHASES, not a turn-by-turn script"
  - "Each arrow (->) does NOT mean 'next turn' - it means 'next type of refinement'"
  - "You may stay in the same stage for 2-4 turns if needed to reveal details gradually"
settings:
  num_goal_images: 1
  min_turns: 3
  max_turns: 8