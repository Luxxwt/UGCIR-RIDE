template_id: T23_Abstract_Emotion_Based_Refinement
description: "The user starts with a concrete subject request, then refines the search results by applying abstract emotional or atmospheric adjectives (e.g., 'more serene', 'too chaotic', 'needs to be gloomy')."
dialogue_pattern:
  description: "Broad Category -> Further Refinement(if needed) -> Emotional Atmosphere Refinement -> Further Refinement (if needed) -> Lock on Target"
  important_notes:
  - "These stages are LOGICAL PHASES, not a turn-by-turn script"
  - "Each arrow (->) does NOT mean 'next turn' - it means 'next type of interaction'"
  - "Further Refinement is the ONLY flexible stage that may be repeated multiple times (not just once)" 
  - "Emotional Atmosphere Refinement: This is the CRITICAL stage. Look at the retrieved images and the Target. Use ABSTRACT emotional words to bridge the gap."
  - "Avoid purely physical descriptions in this stage if possible."
  - "Example interaction: 'I see the forest, but make it feel more spooky and mysterious.'"
settings:
  num_goal_images: 1
  min_turns: 3
  max_turns: 8