template_id: T03_Progressive_Refinement_Specify_Quantity
description: "The user makes the number of objects explicit during the refinement process."
dialogue_pattern:
  description: "Broad Category -> Add Attributes -> Specify Number -> Further Refinement (if needed) -> Lock on Target"
  important_notes:
  - "These stages are LOGICAL PHASES, not a turn-by-turn script"
  - "Each arrow (->) does NOT mean 'next turn' - it means 'next type of refinement'"
  - "You may stay in the same stage for 2-4 turns if needed to reveal details gradually"
settings:
  num_goal_images: 1
  min_turns: 3
  max_turns: 8