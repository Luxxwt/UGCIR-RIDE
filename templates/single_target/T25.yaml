template_id: T25_Abstract_Atmosphere_Based_Refinement
description: "The user refines a concrete subject search by applying atmospheric, narrative, or ambient qualities (e.g., 'festive', 'ethereal', 'like a fairy tale')."
dialogue_pattern:
  description: "Broad Category -> Further Refinement(if needed) ->  Atmosphere/Ambiance Refinement -> Further Refinement(if needed) -> Lock on Target"
  important_notes:
  - "These stages are LOGICAL PHASES, not a turn-by-turn script"
  - "Each arrow (->) does NOT mean 'next turn' - it means 'next type of interaction'"
  - "Further Refinement is the ONLY flexible stage that may be repeated multiple times (not just once)"
  - "Atmosphere/Ambiance Refinement: This is the CRITICAL stage. Add descriptions that set the 'scene' or 'spirit'."
  - "Language Strategy: Use evocative phrases, similes, or narrative descriptors. (e.g., 'Make it feel like a cozy Christmas morning')."
settings:
  num_goal_images: 1
  min_turns: 3
  max_turns: 8