template_id: T13_Attribute_Modification_Context_Change
description: "The user finds an image that matches their desired subject, but requests to change the background, environment, or scene context while keeping the subject identical."
dialogue_pattern:
  description: "Broad Category -> Further Refinement (if needed) -> Baseline Match Found and Context Change Request  -> Further Refinement (if needed) -> Lock on Target"
  important_notes:
  - "These stages are LOGICAL PHASES, not a turn-by-turn script"
  - "Each arrow (->) does NOT mean 'next turn' - it means 'next type of interaction'"
  - "This template simulates a TWO-TARGET scenario: Target 1 (baseline) and Target 2 (modified)"
  - "The user first searches for Target 1, which should appear in early retrieved results"
  - "After finding Target 1, the user expresses satisfaction but requests the context change"
  - "Only the environment/context should change. All other attributes must remain consistent between Target 1 and Target 2."
  - "The conversation should feel natural, e.g.:'This is great, but could it be outdoors instead?'" 
  - "Baseline Match Found and Context Change Request stage: User acknowledges the current result matches most needs but specifies the single attribute to change"
  - "Lock on Target stage: User confirms the modified version (Target 2) is found"
settings:  
  num_goal_images: 2
  min_turns: 3
  max_turns: 10
special_instructions:
    target_structure:
      - "You will receive TWO target descriptions:"
      - "target_image_1_description: The baseline image (should appear in early results)"
      - "target_image_2_description: The modified version (differs by the context)"